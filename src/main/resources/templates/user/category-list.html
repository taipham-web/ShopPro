<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Khám phá các danh mục sản phẩm thể thao tại SportWear Shop" />
    <title>Danh mục sản phẩm - SportWear Shop</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <style>
      .categories-page {
        background: #f8f9fa;
        min-height: 100vh;
      }

      .categories-container {
        max-width: 1400px;
        margin: 0 auto;
        padding: 40px 20px;
      }

      /* Page Header */
      .page-header {
        text-align: center;
        margin-bottom: 40px;
      }

      .page-header h1 {
        font-size: 2.2rem;
        color: #333;
        margin-bottom: 10px;
        font-weight: 700;
      }

      .page-header h1 i {
        color: #007bff;
        margin-right: 10px;
      }

      .page-header p {
        color: #6c757d;
        font-size: 1rem;
      }

      /* Main Layout */
      .main-layout {
        display: grid;
        grid-template-columns: 280px 1fr;
        gap: 30px;
      }

      /* Sidebar - Category List */
      .category-sidebar {
        background: white;
        border-radius: 16px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        padding: 25px;
        height: fit-content;
        position: sticky;
        top: 100px;
      }

      .sidebar-title {
        font-size: 1.1rem;
        font-weight: 700;
        color: #333;
        margin-bottom: 20px;
        padding-bottom: 15px;
        border-bottom: 2px solid #007bff;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .sidebar-title i {
        color: #007bff;
      }

      .category-list {
        list-style: none;
        padding: 0;
        margin: 0;
      }

      .category-item {
        margin-bottom: 5px;
      }

      .category-link {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 12px 15px;
        color: #333;
        text-decoration: none;
        border-radius: 10px;
        transition: all 0.3s ease;
        font-weight: 500;
      }

      .category-link:hover {
        background: #f0f4ff;
        color: #007bff;
        padding-left: 20px;
      }

      .category-link.active {
        background: linear-gradient(135deg, #007bff, #0056b3);
        color: white;
      }

      .category-link.active .product-count {
        background: rgba(255, 255, 255, 0.2);
        color: white;
      }

      .category-link .category-name {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .category-link .category-name i {
        font-size: 0.9rem;
        opacity: 0.7;
      }

      .product-count {
        background: #f0f4ff;
        color: #007bff;
        padding: 4px 10px;
        border-radius: 20px;
        font-size: 0.8rem;
        font-weight: 600;
      }

      /* Products Section */
      .products-section {
        background: white;
        border-radius: 16px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        padding: 30px;
      }

      .products-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 25px;
        padding-bottom: 20px;
        border-bottom: 1px solid #eee;
      }

      .products-header h2 {
        font-size: 1.4rem;
        color: #333;
        display: flex;
        align-items: center;
        gap: 10px;
        margin: 0;
      }

      .products-header h2 i {
        color: #007bff;
      }

      .products-header .results-count {
        color: #6c757d;
        font-size: 0.95rem;
      }

      /* Products Grid */
      .products-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
        gap: 25px;
      }

      .product-card {
        background: #fafafa;
        border-radius: 14px;
        overflow: hidden;
        transition: all 0.3s ease;
        border: 1px solid #eee;
      }

      .product-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.12);
        border-color: transparent;
      }

      .product-image {
        height: 200px;
        position: relative;
        overflow: hidden;
        background: #f0f0f0;
      }

      .product-image img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: transform 0.4s ease;
      }

      .product-card:hover .product-image img {
        transform: scale(1.08);
      }

      .product-badge {
        position: absolute;
        top: 10px;
        left: 10px;
        background: #e74a3b;
        color: white;
        padding: 5px 12px;
        border-radius: 20px;
        font-size: 0.75rem;
        font-weight: 600;
      }

      .product-info {
        padding: 18px;
      }

      .product-name {
        font-size: 1rem;
        font-weight: 600;
        color: #333;
        margin-bottom: 10px;
        line-height: 1.4;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
        min-height: 45px;
      }

      .product-name a {
        color: inherit;
        text-decoration: none;
      }

      .product-name a:hover {
        color: #007bff;
      }

      .product-price {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 12px;
      }

      .price-current {
        font-size: 1.15rem;
        font-weight: 700;
        color: #e74a3b;
      }

      .price-old {
        font-size: 0.9rem;
        color: #999;
        text-decoration: line-through;
      }

      .btn-view {
        display: block;
        width: 100%;
        padding: 10px;
        background: linear-gradient(135deg, #007bff, #0056b3);
        color: white;
        border: none;
        border-radius: 8px;
        font-weight: 600;
        text-align: center;
        text-decoration: none;
        font-size: 0.9rem;
        transition: all 0.3s;
      }

      .btn-view:hover {
        box-shadow: 0 5px 20px rgba(0, 123, 255, 0.4);
        color: white;
      }

      /* Welcome/Select State */
      .select-category-state {
        text-align: center;
        padding: 80px 20px;
      }

      .select-category-state .icon-wrapper {
        width: 100px;
        height: 100px;
        background: linear-gradient(135deg, #f0f4ff, #e0e8ff);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 25px;
      }

      .select-category-state .icon-wrapper i {
        font-size: 2.5rem;
        color: #007bff;
      }

      .select-category-state h3 {
        color: #333;
        font-size: 1.4rem;
        margin-bottom: 10px;
      }

      .select-category-state p {
        color: #6c757d;
        font-size: 1rem;
      }

      /* Empty Products */
      .empty-products {
        text-align: center;
        padding: 60px 20px;
      }

      .empty-products i {
        font-size: 4rem;
        color: #ddd;
        margin-bottom: 20px;
      }

      .empty-products h3 {
        color: #333;
        margin-bottom: 10px;
      }

      .empty-products p {
        color: #6c757d;
      }

      /* Responsive */
      @media (max-width: 992px) {
        .main-layout {
          grid-template-columns: 1fr;
        }

        .category-sidebar {
          position: static;
        }

        .category-list {
          display: flex;
          flex-wrap: wrap;
          gap: 10px;
        }

        .category-item {
          margin-bottom: 0;
        }

        .category-link {
          padding: 10px 15px;
          background: #f0f4ff;
          border-radius: 25px;
        }
      }

      @media (max-width: 768px) {
        .products-grid {
          grid-template-columns: repeat(2, 1fr);
          gap: 15px;
        }

        .product-image {
          height: 150px;
        }

        .page-header h1 {
          font-size: 1.6rem;
        }
      }

      @media (max-width: 480px) {
        .products-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body class="categories-page">
    <div th:replace="~{fragments/header :: header}"></div>

    <div class="categories-container">
      <!-- Page Header -->
      <div class="page-header">
        <h1><i class="fas fa-th-large"></i>Danh mục sản phẩm</h1>
        <p>Chọn danh mục để xem các sản phẩm</p>
      </div>

      <!-- Main Layout -->
      <div class="main-layout">
        <!-- Sidebar - Category List -->
        <aside class="category-sidebar">
          <h3 class="sidebar-title">
            <i class="fas fa-list"></i> Danh mục
          </h3>
          <ul class="category-list">
            <li th:each="cat : ${categories}" class="category-item">
              <a th:href="@{/categories(selected=${cat.id})}"
                 th:classappend="${selectedCategory != null && selectedCategory.id == cat.id} ? 'active' : ''"
                 class="category-link">
                <span class="category-name">
                  <i class="fas fa-folder"></i>
                  <span th:text="${cat.name}">Danh mục</span>
                </span>
                <span class="product-count" th:text="${cat.products.size()}">0</span>
              </a>
            </li>
          </ul>
        </aside>

        <!-- Products Section -->
        <section class="products-section">
          <!-- When no category selected -->
          <div th:if="${selectedCategory == null}" class="select-category-state">
            <div class="icon-wrapper">
              <i class="fas fa-hand-pointer"></i>
            </div>
            <h3>Chọn một danh mục</h3>
            <p>Nhấp vào danh mục bên trái để xem các sản phẩm</p>
          </div>

          <!-- When category is selected -->
          <div th:if="${selectedCategory != null}">
            <div class="products-header">
              <h2>
                <i class="fas fa-box"></i>
                <span th:text="${selectedCategory.name}">Danh mục</span>
              </h2>
              <span class="results-count" th:text="${selectedProducts.size()} + ' sản phẩm'">0 sản phẩm</span>
            </div>

            <!-- Products Grid -->
            <div th:if="${selectedProducts != null && selectedProducts.size() > 0}" class="products-grid">
              <div th:each="product : ${selectedProducts}" class="product-card">
                <div class="product-image">
                  <a th:href="@{/products/{id}(id=${product.id})}">
                    <img th:src="${product.image}" th:alt="${product.name}" />
                  </a>
                  <span th:if="${product.salePrice != null}" class="product-badge">SALE</span>
                </div>
                <div class="product-info">
                  <h3 class="product-name">
                    <a th:href="@{/products/{id}(id=${product.id})}" th:text="${product.name}">
                      Tên sản phẩm
                    </a>
                  </h3>
                  <div class="product-price">
                    <span th:if="${product.salePrice != null}" class="price-current"
                          th:text="${#numbers.formatDecimal(product.salePrice, 0, 'COMMA', 0, 'POINT')} + 'đ'">
                      500,000đ
                    </span>
                    <span th:unless="${product.salePrice != null}" class="price-current"
                          th:text="${#numbers.formatDecimal(product.price, 0, 'COMMA', 0, 'POINT')} + 'đ'">
                      500,000đ
                    </span>
                    <span th:if="${product.salePrice != null}" class="price-old"
                          th:text="${#numbers.formatDecimal(product.price, 0, 'COMMA', 0, 'POINT')} + 'đ'">
                      600,000đ
                    </span>
                  </div>
                  <a th:href="@{/products/{id}(id=${product.id})}" class="btn-view">
                    <i class="fas fa-eye"></i> Xem chi tiết
                  </a>
                </div>
              </div>
            </div>

            <!-- Empty Products -->
            <div th:if="${selectedProducts == null || selectedProducts.size() == 0}" class="empty-products">
              <i class="fas fa-box-open"></i>
              <h3>Chưa có sản phẩm</h3>
              <p>Danh mục này chưa có sản phẩm nào</p>
            </div>
          </div>
        </section>
      </div>
    </div>

    <div th:replace="~{fragments/footer :: footer}"></div>
  </body>
</html>
