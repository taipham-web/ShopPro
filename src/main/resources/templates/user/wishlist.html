<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="_csrf" th:content="${_csrf.token}" />
    <meta name="_csrf_header" th:content="${_csrf.headerName}" />
    <title>Danh sách yêu thích - SportWear Shop</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <style>
      .wishlist-page {
        background: #f8f9fa;
        min-height: 100vh;
      }

      .wishlist-container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 40px 20px;
      }

      /* Page Header */
      .page-header {
        text-align: center;
        margin-bottom: 40px;
      }

      .page-header h1 {
        font-size: 2.2rem;
        color: #333;
        margin-bottom: 10px;
        font-weight: 700;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 15px;
      }

      .page-header h1 i {
        color: #e74a3b;
      }

      .page-header p {
        color: #6c757d;
        font-size: 1rem;
      }

      /* Stats */
      .wishlist-stats {
        display: flex;
        justify-content: center;
        gap: 30px;
        margin-bottom: 40px;
      }

      .stat-box {
        background: white;
        padding: 20px 40px;
        border-radius: 12px;
        text-align: center;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
      }

      .stat-box .number {
        font-size: 2rem;
        font-weight: 700;
        color: #007bff;
      }

      .stat-box .label {
        color: #6c757d;
        font-size: 0.9rem;
      }

      /* Alert Messages */
      .alert {
        padding: 15px 20px;
        border-radius: 10px;
        margin-bottom: 25px;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .alert-success {
        background: #d4edda;
        color: #155724;
        border: 1px solid #c3e6cb;
      }

      .alert-warning {
        background: #fff3cd;
        color: #856404;
        border: 1px solid #ffeeba;
      }

      /* Wishlist Grid */
      .wishlist-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 25px;
      }

      .wishlist-card {
        background: white;
        border-radius: 16px;
        overflow: hidden;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        transition: all 0.3s ease;
        position: relative;
      }

      .wishlist-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 15px 40px rgba(0, 0, 0, 0.15);
      }

      /* Remove Button */
      .btn-remove {
        position: absolute;
        top: 15px;
        right: 15px;
        width: 40px;
        height: 40px;
        background: white;
        border: none;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        box-shadow: 0 3px 10px rgba(0, 0, 0, 0.15);
        transition: all 0.3s ease;
        z-index: 10;
      }

      .btn-remove i {
        color: #e74a3b;
        font-size: 1.1rem;
      }

      .btn-remove:hover {
        background: #e74a3b;
        transform: scale(1.1);
      }

      .btn-remove:hover i {
        color: white;
      }

      /* Product Image */
      .product-image {
        height: 220px;
        overflow: hidden;
        position: relative;
      }

      .product-image img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: transform 0.4s ease;
      }

      .wishlist-card:hover .product-image img {
        transform: scale(1.08);
      }

      .product-badge {
        position: absolute;
        top: 15px;
        left: 15px;
        background: #e74a3b;
        color: white;
        padding: 5px 12px;
        border-radius: 20px;
        font-size: 0.75rem;
        font-weight: 600;
      }

      /* Product Info */
      .product-info {
        padding: 20px;
      }

      .product-category {
        color: #007bff;
        font-size: 0.85rem;
        font-weight: 500;
        margin-bottom: 8px;
      }

      .product-name {
        font-size: 1.1rem;
        font-weight: 600;
        color: #333;
        margin-bottom: 12px;
        line-height: 1.4;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
        min-height: 50px;
      }

      .product-name a {
        color: inherit;
        text-decoration: none;
      }

      .product-name a:hover {
        color: #007bff;
      }

      .product-price {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 15px;
      }

      .price-current {
        font-size: 1.2rem;
        font-weight: 700;
        color: #e74a3b;
      }

      .price-old {
        font-size: 0.9rem;
        color: #999;
        text-decoration: line-through;
      }

      /* Action Buttons */
      .card-actions {
        display: flex;
        gap: 10px;
      }

      .btn-add-cart {
        flex: 1;
        padding: 12px;
        background: linear-gradient(135deg, #007bff, #0056b3);
        color: white;
        border: none;
        border-radius: 8px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        text-decoration: none;
      }

      .btn-add-cart:hover {
        box-shadow: 0 5px 20px rgba(0, 123, 255, 0.4);
        color: white;
      }

      .btn-view {
        padding: 12px 15px;
        background: #f0f4ff;
        color: #007bff;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        transition: all 0.3s ease;
        text-decoration: none;
      }

      .btn-view:hover {
        background: #007bff;
        color: white;
      }

      /* Date Added */
      .date-added {
        font-size: 0.8rem;
        color: #999;
        margin-top: 12px;
        padding-top: 12px;
        border-top: 1px solid #eee;
        display: flex;
        align-items: center;
        gap: 5px;
      }

      /* Empty State */
      .empty-state {
        text-align: center;
        padding: 80px 20px;
        background: white;
        border-radius: 20px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
      }

      .empty-state .icon-wrapper {
        width: 120px;
        height: 120px;
        background: linear-gradient(135deg, #ffe0e0, #ffcaca);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 30px;
      }

      .empty-state .icon-wrapper i {
        font-size: 3.5rem;
        color: #e74a3b;
      }

      .empty-state h3 {
        color: #333;
        font-size: 1.5rem;
        margin-bottom: 15px;
      }

      .empty-state p {
        color: #6c757d;
        font-size: 1rem;
        margin-bottom: 25px;
      }

      .empty-state .btn-shop {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 14px 30px;
        background: linear-gradient(135deg, #007bff, #0056b3);
        color: white;
        text-decoration: none;
        border-radius: 10px;
        font-weight: 600;
        transition: all 0.3s ease;
      }

      .empty-state .btn-shop:hover {
        transform: translateY(-3px);
        box-shadow: 0 10px 30px rgba(0, 123, 255, 0.3);
      }

      /* Responsive */
      @media (max-width: 768px) {
        .page-header h1 {
          font-size: 1.6rem;
        }

        .wishlist-stats {
          flex-direction: column;
          align-items: center;
        }

        .wishlist-grid {
          grid-template-columns: repeat(2, 1fr);
          gap: 15px;
        }

        .product-image {
          height: 160px;
        }
      }

      @media (max-width: 480px) {
        .wishlist-grid {
          grid-template-columns: 1fr;
        }

        .card-actions {
          flex-direction: column;
        }
      }
    </style>
  </head>
  <body class="wishlist-page">
    <div th:replace="~{fragments/header :: header}"></div>

    <div class="wishlist-container">
      <!-- Page Header -->
      <div class="page-header">
        <h1><i class="fas fa-heart"></i> Danh sách yêu thích</h1>
        <p>Các sản phẩm bạn đã lưu để mua sau</p>
      </div>

      <!-- Stats -->
      <div class="wishlist-stats">
        <div class="stat-box">
          <div class="number" th:text="${totalItems}">0</div>
          <div class="label">Sản phẩm yêu thích</div>
        </div>
      </div>

      <!-- Alert Messages -->
      <div th:if="${successMessage}" class="alert alert-success">
        <i class="fas fa-check-circle"></i>
        <span th:text="${successMessage}"></span>
      </div>

      <div th:if="${warningMessage}" class="alert alert-warning">
        <i class="fas fa-exclamation-triangle"></i>
        <span th:text="${warningMessage}"></span>
      </div>

      <!-- Wishlist Grid -->
      <div th:if="${wishlistItems != null && wishlistItems.size() > 0}" class="wishlist-grid">
        <div th:each="item : ${wishlistItems}" class="wishlist-card">
          <!-- Remove Button -->
          <form th:action="@{/user/wishlist/remove/{id}(id=${item.id})}" method="post" style="display: contents;">
            <button type="submit" class="btn-remove" title="Xóa khỏi yêu thích">
              <i class="fas fa-heart-broken"></i>
            </button>
          </form>

          <!-- Product Image -->
          <div class="product-image">
            <a th:href="@{/products/{id}(id=${item.product.id})}">
              <img th:src="${item.product.image}" th:alt="${item.product.name}" />
            </a>
            <span th:if="${item.product.salePrice != null}" class="product-badge">SALE</span>
          </div>

          <!-- Product Info -->
          <div class="product-info">
            <div th:if="${item.product.category != null}" class="product-category" th:text="${item.product.category.name}">
              Danh mục
            </div>
            <h3 class="product-name">
              <a th:href="@{/products/{id}(id=${item.product.id})}" th:text="${item.product.name}">
                Tên sản phẩm
              </a>
            </h3>
            <div class="product-price">
              <span th:if="${item.product.salePrice != null}" class="price-current"
                    th:text="${#numbers.formatDecimal(item.product.salePrice, 0, 'COMMA', 0, 'POINT')} + 'đ'">
                500,000đ
              </span>
              <span th:unless="${item.product.salePrice != null}" class="price-current"
                    th:text="${#numbers.formatDecimal(item.product.price, 0, 'COMMA', 0, 'POINT')} + 'đ'">
                500,000đ
              </span>
              <span th:if="${item.product.salePrice != null}" class="price-old"
                    th:text="${#numbers.formatDecimal(item.product.price, 0, 'COMMA', 0, 'POINT')} + 'đ'">
                600,000đ
              </span>
            </div>

            <!-- Action Buttons -->
            <div class="card-actions">
              <a th:href="@{/products/{id}(id=${item.product.id})}" class="btn-add-cart">
                <i class="fas fa-shopping-cart"></i> Mua ngay
              </a>
              <a th:href="@{/products/{id}(id=${item.product.id})}" class="btn-view">
                <i class="fas fa-eye"></i>
              </a>
            </div>

            <!-- Date Added -->
            <div class="date-added">
              <i class="fas fa-clock"></i>
              <span th:text="'Đã thêm ' + ${#temporals.format(item.createdAt, 'dd/MM/yyyy')}">Đã thêm 01/01/2024</span>
            </div>
          </div>
        </div>
      </div>

      <!-- Empty State -->
      <div th:if="${wishlistItems == null || wishlistItems.size() == 0}" class="empty-state">
        <div class="icon-wrapper">
          <i class="fas fa-heart"></i>
        </div>
        <h3>Chưa có sản phẩm yêu thích</h3>
        <p>Hãy khám phá và thêm những sản phẩm bạn yêu thích vào đây</p>
        <a th:href="@{/products}" class="btn-shop">
          <i class="fas fa-shopping-bag"></i> Khám phá sản phẩm
        </a>
      </div>
    </div>

    <div th:replace="~{fragments/footer :: footer}"></div>
  </body>
</html>
