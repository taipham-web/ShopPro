<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đặt hàng thành công - SportWear Shop</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <style>
      .success-container {
        max-width: 600px;
        margin: 60px auto;
        text-align: center;
        padding: 40px;
        background: white;
        border-radius: 16px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
      }
      .success-icon {
        width: 90px;
        height: 90px;
        background: linear-gradient(135deg, #28a745, #20c997);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 24px;
        animation: popIn 0.5s ease;
      }
      .success-icon i {
        color: white;
        font-size: 2.5rem;
      }
      @keyframes popIn {
        0% { transform: scale(0); opacity: 0; }
        70% { transform: scale(1.1); }
        100% { transform: scale(1); opacity: 1; }
      }
      .success-title {
        font-size: 1.8rem;
        font-weight: 700;
        color: #28a745;
        margin-bottom: 12px;
      }
      .success-subtitle {
        color: #6c757d;
        font-size: 1rem;
        margin-bottom: 30px;
      }
      .order-info-box {
        background: #f8f9fa;
        border-radius: 10px;
        padding: 20px;
        margin: 20px 0;
        text-align: left;
      }
      .order-info-row {
        display: flex;
        justify-content: space-between;
        padding: 8px 0;
        border-bottom: 1px solid #e9ecef;
      }
      .order-info-row:last-child {
        border-bottom: none;
      }
      .paypal-badge {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        background: #003087;
        color: white;
        padding: 4px 12px;
        border-radius: 20px;
        font-size: 0.85rem;
      }
      .action-buttons {
        display: flex;
        gap: 12px;
        justify-content: center;
        margin-top: 24px;
      }
    </style>
  </head>
  <body>
    <!-- Header -->
    <div th:replace="~{fragments/header :: header}"></div>

    <section class="section">
      <div class="container">
        <div class="success-container">
          <div class="success-icon">
            <i class="fas fa-check"></i>
          </div>

          <h1 class="success-title">Đặt hàng thành công!</h1>
          <p class="success-subtitle" th:text="${message} ?: 'Cảm ơn bạn đã mua hàng tại SportWear Shop.'">
            Cảm ơn bạn đã mua hàng tại SportWear Shop.
          </p>

          <div class="order-info-box">
            <div class="order-info-row" th:if="${orderCode}">
              <span><strong>Mã đơn hàng:</strong></span>
              <span th:text="${orderCode}" style="font-weight: 600; color: #dc3545;">#ORD123456</span>
            </div>
            <div class="order-info-row" th:if="${totalAmount}">
              <span><strong>Tổng thanh toán:</strong></span>
              <span th:text="${#numbers.formatDecimal(totalAmount, 0, 'COMMA', 0, 'POINT')} + ' đ'"
                    style="font-weight: 600;">0 đ</span>
            </div>
            <div class="order-info-row" th:if="${paypalOrderId}">
              <span><strong>Phương thức:</strong></span>
              <span class="paypal-badge">
                <i class="fab fa-paypal"></i> PayPal
              </span>
            </div>
            <div class="order-info-row" th:if="${paypalOrderId}">
              <span><strong>Mã giao dịch PayPal:</strong></span>
              <span th:text="${paypalOrderId}" style="font-size: 0.85rem; color: #6c757d;"></span>
            </div>
          </div>

          <p style="color: #6c757d; font-size: 0.9rem; margin-bottom: 10px;">
            <i class="fas fa-envelope"></i>
            Chúng tôi sẽ gửi email xác nhận đơn hàng sớm nhất.
          </p>
          <p style="color: #6c757d; font-size: 0.9rem;">
            <i class="fas fa-truck"></i>
            Dự kiến giao hàng trong <strong>3-5 ngày làm việc</strong>.
          </p>

          <div class="action-buttons">
            <a th:href="@{/}" class="btn btn-outline-secondary">
              <i class="fas fa-home"></i> Về trang chủ
            </a>
            <a th:href="@{/products}" class="btn btn-success">
              <i class="fas fa-shopping-bag"></i> Tiếp tục mua sắm
            </a>
          </div>
        </div>
      </div>
    </section>

    <!-- Footer -->
    <div th:replace="~{fragments/footer :: footer}"></div>
  </body>
</html>
