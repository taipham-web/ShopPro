<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <body>
    <header th:fragment="header">
      <!-- CSRF tokens for AJAX requests -->
      <meta name="_csrf" th:content="${_csrf != null ? _csrf.token : ''}" />
      <meta
        name="_csrf_header"
        th:content="${_csrf != null ? _csrf.headerName : 'X-CSRF-TOKEN'}"
      />
      <!-- Header Top -->
      <div class="header-top">
        <div class="container header-top-content">
          <div>
            <i class="fas fa-phone"></i> Hotline: 1900 1234 |
            <i class="fas fa-envelope"></i> support@sportwear.vn
          </div>
          <div>
            <a href="#"><i class="fab fa-facebook-f"></i></a>
            <a href="#"><i class="fab fa-instagram"></i></a>
            <a href="#"><i class="fab fa-youtube"></i></a>
          </div>
        </div>
      </div>

      <!-- Main Header -->
      <div class="header">
        <div class="container">
          <nav class="navbar">
            <a th:href="@{/}" class="logo">
              <i class="fas fa-running"></i> SportWear
            </a>

            <ul class="nav-menu">
              <li><a th:href="@{/}">Trang chủ</a></li>
              <li><a th:href="@{/products}">Sản phẩm</a></li>
              <li><a th:href="@{/categories}">Danh mục</a></li>
              <li><a th:href="@{/brands}">Thương hiệu</a></li>
              <li><a th:href="@{/about}">Giới thiệu</a></li>
              <li><a th:href="@{/contact}">Liên hệ</a></li>
            </ul>

            <div class="header-icons">
              <!-- Search -->
              <form
                th:action="@{/products/search}"
                method="get"
                class="header-search"
              >
                <input type="text" name="keyword" placeholder="Tìm kiếm..." />
                <button type="submit"><i class="fas fa-search"></i></button>
              </form>

              <!-- User authenticated -->
              <div
                th:if="${#authorization.expression('isAuthenticated()')}"
                class="header-user"
              >
                <a
                  th:if="${#authorization.expression('hasRole(''ADMIN'')')}"
                  th:href="@{/admin}"
                  class="admin-link"
                >
                  <i class="fas fa-cog"></i> Admin
                </a>
                <a th:href="@{/user/profile}">
                  <i class="fas fa-user"></i>
                  <span
                    th:text="${#authentication.name}"
                    class="username-span"
                  ></span>
                </a>
                <form
                  th:action="@{/auth/logout}"
                  method="post"
                  class="header-logout-form"
                >
                  <button type="submit" class="btn-logout">Đăng xuất</button>
                </form>
              </div>

              <!-- User not authenticated -->
              <div
                th:unless="${#authorization.expression('isAuthenticated()')}"
              >
                <a th:href="@{/auth/login}"><i class="fas fa-user"></i></a>
              </div>

              <!-- Cart -->
              <a th:href="@{/cart}" id="cart-icon-link">
                <i class="fas fa-shopping-cart"></i>
                <span class="cart-count" id="cart-count-badge"
                      th:text="${cartCount != null ? cartCount : 0}">0</span>
              </a>
            </div>
          </nav>
        </div>
      </div>
    </header>

    <script>
      // Cho phép cập nhật realtime sau khi add to cart (AJAX)
      window.updateCartCount = function () {
        fetch('/cart/count')
          .then(function (res) { return res.json(); })
          .then(function (data) {
            var badge = document.getElementById('cart-count-badge');
            if (badge) badge.textContent = data.count || 0;
          })
          .catch(function () {});
      };
    </script>
  </body>
</html>
