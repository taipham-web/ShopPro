<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng nhập - SportWear Shop</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #1a1a2e;
        font-family: 'Segoe UI', system-ui, sans-serif;
      }
      .auth-wrapper {
        display: flex;
        width: 900px;
        max-width: 96vw;
        min-height: 560px;
        border-radius: 20px;
        overflow: hidden;
        box-shadow: 0 25px 60px rgba(0,0,0,0.5);
      }
      /* ---- LEFT BANNER ---- */
      .auth-banner {
        flex: 1;
        position: relative;
        overflow: hidden;
        min-width: 0;
      }
      .auth-banner img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }
      .auth-banner-back {
        position: absolute;
        top: 16px;
        left: 16px;
        color: rgba(255,255,255,0.75);
        font-size: 0.8rem;
        text-decoration: none;
        display: flex;
        align-items: center;
        gap: 5px;
        z-index: 5;
        transition: color 0.2s;
      }
      .auth-banner-back:hover { color: #fff; }

      /* ---- RIGHT FORM ---- */
      .auth-form-side {
        width: 420px;
        flex-shrink: 0;
        background: #fff;
        display: flex;
        flex-direction: column;
        justify-content: center;
        padding: 48px 44px;
      }
      .auth-title {
        font-size: 1.9rem;
        font-weight: 800;
        color: #111;
        margin-bottom: 6px;
        letter-spacing: -0.5px;
      }
      .auth-subtitle {
        font-size: 0.88rem;
        color: #888;
        margin-bottom: 32px;
      }
      .auth-alert {
        padding: 10px 14px;
        border-radius: 8px;
        font-size: 0.85rem;
        margin-bottom: 16px;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .auth-alert-danger { background: #fff0f0; color: #c0392b; border: 1px solid #f5c6cb; }
      .auth-alert-success { background: #f0fff4; color: #27ae60; border: 1px solid #b7ebc8; }
      .auth-field { margin-bottom: 18px; }
      .auth-field-label {
        font-size: 0.8rem;
        font-style: italic;
        color: #555;
        margin-bottom: 6px;
        display: block;
      }
      .auth-field-label-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 6px;
      }
      .auth-field-label-row span {
        font-size: 0.8rem;
        font-style: italic;
        color: #555;
      }
      .auth-field-label-row a {
        font-size: 0.8rem;
        color: #0052cc;
        text-decoration: none;
        font-style: italic;
      }
      .auth-field-label-row a:hover { text-decoration: underline; }
      .auth-input-wrap {
        display: flex;
        align-items: center;
        background: #f4f5f7;
        border-radius: 10px;
        padding: 0 14px;
        gap: 10px;
        border: 1.5px solid transparent;
        transition: border-color 0.2s, background 0.2s;
      }
      .auth-input-wrap:focus-within {
        background: #fff;
        border-color: #0052cc;
      }
      .auth-input-wrap i {
        color: #aaa;
        font-size: 0.9rem;
        flex-shrink: 0;
      }
      .auth-input-wrap input {
        border: none;
        background: transparent;
        outline: none;
        width: 100%;
        padding: 13px 0;
        font-size: 0.92rem;
        color: #212529;
      }
      .auth-btn {
        width: 100%;
        padding: 14px;
        background: #0052cc;
        color: #fff;
        border: none;
        border-radius: 10px;
        font-size: 1rem;
        font-weight: 700;
        cursor: pointer;
        margin-top: 8px;
        transition: background 0.2s, transform 0.2s;
        letter-spacing: 0.3px;
      }
      .auth-btn:hover {
        background: #0041a8;
        transform: translateY(-1px);
      }
      .auth-footer-text {
        text-align: center;
        margin-top: 24px;
        font-size: 0.87rem;
        color: #777;
      }
      .auth-footer-text a {
        color: #0052cc;
        font-weight: 600;
        text-decoration: none;
        margin-left: 4px;
      }
      .auth-footer-text a:hover { text-decoration: underline; }

      @media (max-width: 640px) {
        .auth-banner { display: none; }
        .auth-form-side { width: 100%; padding: 36px 24px; }
        .auth-wrapper { border-radius: 12px; }
      }
    </style>
  </head>
  <body>
    <div class="auth-wrapper">
      <!-- LEFT: Sporty Banner -->
      <div class="auth-banner">
        <a th:href="@{/}" class="auth-banner-back">
          <i class="fas fa-arrow-left"></i> Trang chủ
        </a>
        <img th:src="@{/images/login-banner.png}" alt="Never Give Up - SportWear" />
      </div>

      <!-- RIGHT: Login Form -->
      <div class="auth-form-side">
        <h1 class="auth-title">Welcome back</h1>
        <p class="auth-subtitle">Đăng nhập tài khoản để tiếp tục</p>

        <!-- Alerts -->
        <div th:if="${param.error}" class="auth-alert auth-alert-danger">
          <i class="fas fa-exclamation-circle"></i> Email hoặc mật khẩu không đúng!
        </div>
        <div th:if="${param.logout}" class="auth-alert auth-alert-success">
          <i class="fas fa-check-circle"></i> Đăng xuất thành công!
        </div>
        <div th:if="${param.registered}" class="auth-alert auth-alert-success">
          <i class="fas fa-check-circle"></i> Đăng ký thành công! Vui lòng đăng nhập.
        </div>
        <div th:if="${success}" class="auth-alert auth-alert-success">
          <i class="fas fa-check-circle"></i> <span th:text="${success}"></span>
        </div>

        <form th:action="@{/auth/login}" method="post">
          <!-- Email -->
          <div class="auth-field">
            <label class="auth-field-label">Email Address</label>
            <div class="auth-input-wrap">
              <i class="fas fa-envelope"></i>
              <input type="email" name="email" placeholder="yourname@email.com" required />
            </div>
          </div>

          <!-- Password -->
          <div class="auth-field">
            <div class="auth-field-label-row">
              <span>Password</span>
              <a th:href="@{/auth/forgot-password}">Quên mật khẩu?</a>
            </div>
            <div class="auth-input-wrap">
              <i class="fas fa-lock"></i>
              <input type="password" name="password" placeholder="••••••••" required />
            </div>
          </div>

          <button type="submit" class="auth-btn">Đăng nhập</button>
        </form>

        <p class="auth-footer-text">
          Chưa có tài khoản?
          <a th:href="@{/auth/register}">Đăng ký</a>
        </p>
      </div>
    </div>
  </body>
</html>
