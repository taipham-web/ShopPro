# ==========================================
# APPLICATION CONFIGURATION
# ==========================================
spring.application.name=SportWear Shop

# Server Configuration
server.port=8080

# ==========================================
# DATABASE CONFIGURATION
# ==========================================
# MySQL Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/sportwear
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ==========================================
# THYMELEAF CONFIGURATION
# ==========================================
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML

# ==========================================
# FILE UPLOAD CONFIGURATION
# ==========================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB
server.tomcat.max-http-form-post-size=50MB
server.tomcat.max-part-count=200

# ==========================================
# STATIC RESOURCES
# ==========================================
spring.web.resources.static-locations=classpath:/static/
spring.mvc.static-path-pattern=/static/**

# ==========================================
# LOGGING CONFIGURATION
# ==========================================
logging.level.root=INFO
logging.level.com.sportswear.shop=DEBUG
logging.level.org.springframework.security=DEBUG

